name: CI-CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Frontend/sms-client

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './Frontend/sms-client/package-lock.json'

    - name: Install dependencies
      run: npm install

    - name: Lint check
      run: npm run lint
      continue-on-error: true

    - name: Build check
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Backend/sms-backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: './Backend/sms-backend/requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test import
      run: python -c "import main; print('Main boot success')"
